<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#0D4F4F"/>
  
  <!-- Ledger book spine -->
  <rect x="126" y="96" width="260" height="320" rx="16" ry="16" fill="#FFFFFF" stroke="#E8E8E8" stroke-width="4"/>
  
  <!-- Book spine left edge -->
  <rect x="126" y="96" width="32" height="320" rx="16" ry="16" fill="#2D8A4E"/>
  <rect x="126" y="96" width="32" height="320" rx="0" ry="0" fill="#2D8A4E"/>
  <rect x="126" y="96" width="18" height="320" rx="4" ry="4" fill="#2D8A4E"/>
  
  <!-- Book spine curve overlay -->
  <rect x="126" y="96" width="18" height="320" rx="8" ry="8" fill="#2D8A4E"/>
  
  <!-- Lines of text on the page -->
  <rect x="178" y="148" width="188" height="6" rx="3" fill="#C9A84C" opacity="0.8"/>
  <rect x="178" y="170" width="165" height="6" rx="3" fill="#C9A84C" opacity="0.5"/>
  <rect x="178" y="192" width="188" height="6" rx="3" fill="#C9A84C" opacity="0.8"/>
  <rect x="178" y="214" width="140" height="6" rx="3" fill="#C9A84C" opacity="0.5"/>
  <rect x="178" y="236" width="188" height="6" rx="3" fill="#C9A84C" opacity="0.8"/>
  <rect x="178" y="258" width="120" height="6" rx="3" fill="#C9A84C" opacity="0.5"/>
  
  <!-- Dollar sign on the page -->
  <text x="270" y="320" font-family="Arial, sans-serif" font-weight="bold" font-size="48" fill="#0D4F4F" text-anchor="middle" opacity="0.6">$</text>
  
  <!-- Dollar sign on the spine -->
  <text x="137" y="280" font-family="Arial, sans-serif" font-weight="bold" font-size="36" fill="#FFFFFF" text-anchor="middle">$</text>
</svg>
